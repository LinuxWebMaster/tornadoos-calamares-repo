image: archlinux:latest

stages:
  - update

update_repo:
  stage: update
  only:
    - schedule  # This runs it on a timer you set in GitLab
    - web       # This lets you click "Run Pipeline" manually
  before_script:
    - pacman -Syu --noconfirm git base-devel aurutils
    - useradd -m builduser
    - echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
  script:
    # 1. Initialize the local repo context
    - sudo -u builduser aur repo --add ./x86_64/tornadoos-repo.db.tar.gz
    
    # 2. Sync with AUR (u=update, d=database, n=no-confirm)
    - sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm
    
    # 3. Configure Git to push changes back
    - git config user.name "TornadoOS Build Bot"
    - git config user.email "ricki.clay@protonmail.com"
    
    # 4. Push the new packages and DB
    - git add x86_64/*.pkg.tar.zst x86_64/tornadoos-repo.db*
    - git commit -m "Automated AUR Sync $(date +%Y-%m-%d)" || echo "No updates found."
    - git push https://oauth2:${GITLAB_TOKEN}@gitlab.com/yugiohmaster88s-gitlab/tornadoos-repo.git HEAD:main