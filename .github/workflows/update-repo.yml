name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest  # Run checkout on Ubuntu (has git)
    steps:
      # ✅ Checkout on Ubuntu host (git is available)
      - name: Checkout Repo
        uses: actions/checkout@v4  # Use v4 for better compatibility
        with:
          fetch-depth: 0
          persist-credentials: true
          lfs: true

      # ✅ Now run everything else in Arch container
      - name: Setup & Update in Arch
        run: |
          # Install dependencies
          sudo pacman -Sy --noconfirm git base-devel sudo
          
          # Build aurutils
          sudo useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/builder
          sudo -u builder git clone https://aur.archlinux.org/aurutils.git /tmp/aurutils
          sudo -u builder bash -c "cd /tmp/aurutils && makepkg -si --noconfirm"
          
          # Add custom repo
          sudo mkdir -p "${{ github.workspace }}/x86_64"
          printf "\n[tornadoos-repo]\nSigLevel = Optional TrustAll\nServer = file://%s/x86_64\n" "${{ github.workspace }}" | sudo tee -a /etc/pacman.conf
          
          # Setup builduser
          sudo useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/builduser
          
          # Configure git
          git config --global --add safe.directory "${{ github.workspace }}"
          
          # Change ownership
          sudo chown -R builduser:builduser x86_64 2>/dev/null || true
          sudo chown -R builduser:builduser update-repo.sh 2>/dev/null || true
          
      - name: Sync AUR Packages
        run: |
          cd "${{ github.workspace }}/x86_64"
          
          # Remove old files
          sudo rm -f *.lck tornadoos-repo.db* tornadoos-repo.files*
          
          # Ensure permissions
          sudo chown -R builduser:builduser .
          
          # Check for packages
          if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
            echo "✅ Found packages, building database..."
            sudo -u builduser repo-add tornadoos-repo.db.tar.gz *.pkg.tar.zst
            
            echo "=== DATABASE VERIFICATION ==="
            file tornadoos-repo.db.tar.gz
            tar -tzf tornadoos-repo.db.tar.gz | head -3
          else
            echo "❌ ERROR: No packages found!"
            ls -la
            exit 1
          fi
          
          sudo rm -f *.lck *.old
          
      - name: Push Updates
        run: |
          cd "${{ github.workspace }}"
          
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          
          cd x86_64
          git add *.pkg.tar.zst tornadoos-repo.db.tar.gz tornadoos-repo.files.tar.gz
          git rm -f tornadoos-repo.db tornadoos-repo.files *.lck 2>/dev/null || true
          cd ..
          
          if git commit -m "Automated AUR Update $(date +%Y-%m-%d)"; then
            git push https://${{ secrets.TOKEN_NAME }}@github.com/LinuxWebMaster/tornadoos-repo.git HEAD:main
          else
            echo "✅ No changes to commit."
          fi