name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *' # Midnight daily
  workflow_dispatch:      # Manual trigger

env:
  # This fixes the Node.js deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # Install official base tools
          pacman -Syu --noconfirm git base-devel sudo
          
          # Setup builduser (makepkg cannot run as root)
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          
          # Fix git ownership issues in containers
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chown -R builduser:builduser .

      - name: Install aurutils (Bootstrap)
        run: |
          # Manually build aurutils from the AUR so we can use it
          sudo -u builduser bash -c "
            cd /tmp && \
            git clone https://aur.archlinux.org/aurutils.git && \
            cd aurutils && \
            makepkg -si --noconfirm
          "

      - name: Sync AUR Packages
        run: |
          # Initialize the repo context
          # Note: Ensure 'tornadoos-repo' matches your actual .db file name
          sudo -u builduser aur repo --add ./x86_64/tornadoos-repo.db.tar.gz
          
          # Sync and rebuild everything in the repo that has an AUR update
          sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm

      - name: Push Updates
        run: |
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          
          git add x86_64/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated AUR Update $(date +%Y-%m-%d)"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
          fi