name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          pacman -Syu --noconfirm git base-devel sudo
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          # Register your repo in the container's pacman.conf
          echo -e "\n[tornadoos-repo]\nSigLevel = Optional TrustAll\nServer = file://$GITHUB_WORKSPACE/x86_64" >> /etc/pacman.conf
          
          chown -R builduser:builduser .

      - name: Install aurutils (Bootstrap)
        run: |
          sudo -u builduser bash -c "
            cd /tmp && \
            git clone https://aur.archlinux.org/aurutils.git --depth 1 && \
            cd aurutils && \
            makepkg -si --noconfirm
          "

      - name: Sync AUR Packages
        run: |
          # Use the clean DB name from your folder
          DB_NAME="tornadoos-repo"
          
          # Ensure the DB exists and is initialized for aurutils
          sudo -u builduser aur repo --add ./x86_64/${DB_NAME}.db.tar.gz
          
          # Sync updates and clean up .old files automatically
          sudo -u builduser aur sync -u -d ${DB_NAME} --noview --noconfirm
          rm -f x86_64/*.old

      - name: Push Updates
        run: |
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          git add x86_64/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated AUR Update $(date +%Y-%m-%d)"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
          fi