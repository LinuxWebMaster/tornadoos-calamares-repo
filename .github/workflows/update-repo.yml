name: TornadoOS Repo Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup & Update
        run: |
          # 1. Install base dependencies (NO aurutils yet - it's in AUR!)
          pacman -Sy --noconfirm git base-devel sudo
          
          # 2. Build and install aurutils FROM AUR manually
          # Create temp build user
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          
          # Clone aurutils from AUR and install it
          sudo -u builder git clone https://aur.archlinux.org/aurutils.git /tmp/aurutils
          sudo -u builder bash -c "cd /tmp/aurutils && makepkg -si --noconfirm"
          
          # 3. NOW add custom repo to pacman.conf (after aurutils is installed)
          mkdir -p "${{ github.workspace }}/x86_64"
          printf "\n[tornadoos-repo]\nSigLevel = Optional TrustAll\nServer = file://%s/x86_64\n" "${{ github.workspace }}" >> /etc/pacman.conf
          
          # 4. Setup builduser for package building
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builduser
          
          # 5. Configure git
          git config --global --add safe.directory "${{ github.workspace }}"
          
          # 6. Change ownership BUT preserve .git for root
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec chown -R builduser:builduser {} \;

      - name: Sync AUR Packages
        run: |
          sudo -u builduser git config --global --add safe.directory "${{ github.workspace }}"
          sudo -u builduser aur repo -a "${{ github.workspace }}/x86_64/tornadoos-repo.db.tar.gz"
          sudo -u builduser aur sync -u -d tornadoos-repo --noview --noconfirm
          rm -f x86_64/*.old

      - name: Push Updates
        run: |
          echo "=== Workspace: ${{ github.workspace }} ==="
          pwd
          ls -la "${{ github.workspace }}"
          
          cd "${{ github.workspace }}"
          
          # Ensure .git is accessible
          chmod -R u+rwX "${{ github.workspace }}/.git" 2>/dev/null || true
          
          git config --global --add safe.directory "${{ github.workspace }}"
          git config --global user.name "TornadoOS Bot"
          git config --global user.email "ricki.clay@protonmail.com"
          
          git add x86_64/
          if git commit -m "Automated AUR Update $(date +%Y-%m-%d)"; then
            git push https://${{ secrets.TOKEN_NAME }}@github.com/LinuxWebMaster/tornadoos-repo.git HEAD:main
          else
            echo "✅ No changes to commit, skipping push."
          fi